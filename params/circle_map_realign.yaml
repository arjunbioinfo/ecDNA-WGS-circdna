# nf-core/circdna 1.1.0 -- Circle-Map Realign branch
# Detects (small) eccDNA. Optimised for Circle-seq/ATAC; usable on WGS with
# caution (higher false-positive rate on WGS). Run: ./run.sh circle_map_realign
input: assets/samplesheet_bam.csv
input_format: BAM
outdir: results/circle_map_realign
genome: GRCh38
circle_identifier: circle_map_realign
max_cpus: 16
max_memory: 128.GB
max_time: 240.h
